<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- reset.css -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- style.css -->
    <link rel="stylesheet" href="./css/style.css" />
    <!-- laptops.css -->
    <link rel="stylesheet" href="./css/laptops.css" />
    <!-- tablets.css -->
    <link rel="stylesheet" href="./css/tablets.css" />
    <!-- mobiles.css -->
    <link rel="stylesheet" href="./css/mobiles.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Buy popular products</title>
  </head>
  <body>
    <!-- container -->
    <div class="container">
      <!---------------------------------- header ------------------------------>
      <header class="container-header">
        <button id="dark-mode-button">Dark Mode</button>
        <img
          src="./images/burger-icon.svg"
          alt="burger-icon; three-equal-horizontal-lines"
          class="header-burger-icon"
        />
        <img src="./images/x-icon.svg" alt="x-icon" class="header-x-icon" />
        <nav class="header-menu">
          <ul class="header-menu-items">
            <li>
              <a href="./index.html" class="header-page-link">Home</a>
            </li>
            <li>
              <a href="./catalog.html" class="header-page-link">Catalog</a>
            </li>
            <li>
              <a href="./contact.html" class="header-page-link">Contact Us</a>
            </li>
          </ul>
        </nav>
        <div class="header-buttons">
          <button class="header-button user-icon">
            <img
              src="./images/user-icon.svg"
              alt="person-symbol-representing-a-user-account-or-profile"
            />
          </button>
          <button class="header-button cart-icon">
            <img src="./images/cart-icon.svg" alt="shopping-cart-icon" />
            <span id="cart-count">0</span>
          </button>
        </div>
      </header>
      <!----------------------- page-1-section-1 -------------------->
      <section class="page-1-section-1">
        <a id="slider-link" href="">
          <img id="page-1-slider-image" />
        </a>
        <div class="page-1-button-container">
          <button class="page-1-slider-previous-button">
            <img
              src="./images/arrow-point-to-left-icon.svg"
              alt="arrow-point-to-left-icon"
            />
            <span
              class="page-1-slider-previous-button-text text-display-none-480px"
              >Previous</span
            >
          </button>
          <button class="page-1-slider-next-button">
            <span class="page-1-slider-next-button-text text-display-none-480px"
              >Next</span
            >
            <img
              src="./images/arrow-point-to-right-icon.svg"
              alt="arrow-point-to-right-icon"
            />
          </button>
        </div>
      </section>
      <!----------------------------- footer -------------------------->
      <footer class="container-footer">
        <section class="container-footer-section">
          <h2 class="container-footer-title">Brands</h2>
          <ul class="footer-brands-list">
            <li>
              <a href="#" class="footer-brands-link">Fender</a>
            </li>
            <li>
              <a href="#" class="footer-brands-link">Gibson</a>
            </li>
            <li>
              <a href="#" class="footer-brands-link">Jockson</a>
            </li>
            <li>
              <a href="#" class="footer-brands-link">Ibanez</a>
            </li>
          </ul>
        </section>
        <section class="container-footer-section">
          <h2 class="container-footer-title">Information</h2>
          <ul class="footer-pages-list">
            <li>
              <a href="#" class="footer-pages-link">Blog</a>
            </li>
            <li>
              <a href="#" class="footer-pages-link">Delivery</a>
            </li>
            <li>
              <a href="#" class="footer-pages-link">About us</a>
            </li>
          </ul>
        </section>
        <section class="container-footer-section">
          <h2 class="container-footer-title">Contact</h2>
          <div class="footer-address-and-social-media-container">
            <address class="footer-address">
              <a
                href="https://maps.app.goo.gl/8F4QLEpDcimQtZMA8"
                target="_blank"
                class="footer-address-text"
                >Tbilisi, str, Rustaveli 24</a
              >
              <a
                href="tel:(32)2 56 78 98"
                target="_blank"
                class="footer-address-text"
                >+(32)2 56 78 98</a
              >
            </address>
            <ul class="footer-social-media-container">
              <li>
                <a href="https://www.facebook.com/" target="_blank">
                  <img
                    src="./images/facebook-icon.svg"
                    alt="facebook-logo"
                    class="footer-social-media"
                  />
                </a>
              </li>
              <li>
                <a href="https://www.whatsapp.com/" target="_blank">
                  <img
                    src="./images/whatsapp-icon.svg"
                    alt="whatsapp-logo"
                    class="footer-social-media"
                  />
                </a>
              </li>
              <li>
                <a href="https://www.instagram.com/" target="_blank">
                  <img
                    src="./images/instagram-icon.svg"
                    alt="instagram-logo"
                    class="footer-social-media"
                  />
                </a>
              </li>
            </ul>
          </div>
        </section>
      </footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
